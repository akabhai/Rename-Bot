name: Cloud Renamer Worker

on:
  repository_dispatch:
    types: [start_rename]

jobs:
  process-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # This caches your requirements.txt libraries

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Run Cloud Worker
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          STRING_SESSION: ${{ secrets.STRING_SESSION }}
          LOG_CHANNEL: ${{ secrets.LOG_CHANNEL }}
          ADMIN: ${{ secrets.ADMIN }}
          PAYLOAD: ${{ toJSON(github.event.client_payload.data) }}
        run: python3 worker_script.py
