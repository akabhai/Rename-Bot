name: File Processor Worker

on:
  repository_dispatch:
    types: [start-rename]

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          sudo apt-get install -y ffmpeg
          pip install -r requirements.txt
          
      - name: Run Worker
        env:
          # Pass all secrets from your GitHub Secrets
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STRING_SESSION: ${{ secrets.STRING_SESSION }}
          # The payload sent from Render
          PAYLOAD: ${{ github.event.client_payload.data }}
        run: python3 worker_script.py
